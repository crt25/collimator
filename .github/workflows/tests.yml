name: Tests

on:
  pull_request:
  workflow_call:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    # Postgres is required because `task setup` runs `db:migrate:deploy`.
    services: &services
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps TCP port 5433 on the host to Postgres
          - 5433:5432

    env: &job_env
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/collimator?schema=public"
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Maximise disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Check out repository code
        uses: actions/checkout@v5
        with: &checkout_options
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          submodules: "true"
          lfs: "true"
          fetch-depth: 0

      - name: Setup CI environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Setup dependencies
        run: task setup

      - name: Lint
        run: task lint

      - name: Build
        run: task build

      - name: Backend tests
        run: task backend:test:coverage

      - name: Frontend tests
        run: task frontend:test:coverage

      - name: Storybook tests
        run: task storybook:test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          # The least common ancestor of these paths is the repo root, so the
          # backend/ and frontend/ prefixes are preserved inside the artifact.
          path: |
            backend/coverage/lcov.info
            backend/coverage-nest-e2e/lcov.info
            frontend/coverage/lcov.info
            frontend/coverage-ct/lcov.info
            frontend/coverage-storybook/lcov.info
          if-no-files-found: warn

      - name: Archive playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-unit
          # https://playwright.dev/docs/trace-viewer#recording-a-trace-on-ci
          path: |
            **/test-results/*/trace.zip
          if-no-files-found: ignore

  app-tests:
    runs-on: ubuntu-latest
    services: *services
    env: *job_env

    steps:
      - name: Maximise disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Check out repository code
        uses: actions/checkout@v5
        with: *checkout_options

      - name: Setup CI environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Setup dependencies
        run: task setup

      - name: Build
        run: task build

      - name: App tests
        run: task apps:test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-app
          # Single-file uploads land at the artifact root, so the sonar job
          # downloads this one into apps/scratch/coverage/ explicitly.
          path: apps/scratch/coverage/lcov.info
          if-no-files-found: warn

      - name: Archive playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-app
          path: |
            **/test-results/*/trace.zip
          if-no-files-found: ignore

  e2e-tests:
    runs-on: ubuntu-latest
    services: *services
    env: *job_env

    steps:
      - name: Maximise disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Check out repository code
        uses: actions/checkout@v5
        with: *checkout_options

      - name: Setup CI environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Setup dependencies
        run: task setup

      - name: Build
        run: task build

      - name: Run e2e tests
        run: task test:e2e
        env:
          # use a different database for e2e tests
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/collimator-tests?schema=public
          # avoid issues with enums: https://github.com/microsoft/playwright/issues/34263
          NODE_OPTIONS: --no-experimental-strip-types

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: |
            backend/coverage-e2e/lcov.info
            frontend/coverage-pw/lcov.info
          if-no-files-found: warn

      - name: Archive playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-e2e
          # https://playwright.dev/docs/trace-viewer#recording-a-trace-on-ci
          path: |
            **/test-results/*/trace.zip
          if-no-files-found: ignore

  sonar:
    runs-on: ubuntu-latest
    needs: [unit-tests, app-tests, e2e-tests]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          submodules: "true"
          lfs: "true"
          fetch-depth: 0

      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download app test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-app
          path: apps/scratch/coverage/

      - name: Download e2e test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-e2e

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
