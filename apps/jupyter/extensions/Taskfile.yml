version: '3'

vars:
  EXTENSION: '{{.EXTENSION | default "none"}}'

tasks:
  default:
    desc: Build the notebook-runner extension
    cmds:
      - task: build

  init:
    desc: Bootstrap the notebook-runner extension (symlinks, version, pip install, labextension link)
    dir: ./notebook-runner
    cmds:
      - node scripts/create-symlink.js
      - node scripts/create-version.js
      - pip install -e "."
      - jupyter labextension develop . --overwrite
      - jupyter labextension link .

  build:
    desc: Build the notebook-runner extension
    dir: ./notebook-runner
    cmds:
      - jlpm build

  link:
    desc: Link the notebook-runner extension into the local Jupyter env
    dir: ./notebook-runner
    cmds:
      - jupyter labextension develop . --overwrite
      - jupyter labextension link .

  test:
    desc: Run notebook-runner tests
    dir: ./notebook-runner
    cmds:
      - jlpm test

  sourcemap:upload:
    desc: Upload notebook-runner sourcemap to Sentry
    dir: ./notebook-runner
    requires:
      vars:
        - name: SENTRY_AUTH_TOKEN
    cmds:
      - jlpm sentry:sourcemaps

  #############################
  # Extension scaffolding helpers (require EXTENSION=<name>)
  #############################

  extension:create:
    desc: Scaffold a new extension via the JupyterLab copier template
    cmds:
      - task: extension:require
        vars: { COMMAND: 'extension:create' }
      - mkdir -p {{.EXTENSION}}
      - cd {{.EXTENSION}} && copier copy --trust https://github.com/jupyterlab/extension-template .

  extension:deps:install:
    desc: Install Python deps for an existing extension
    cmds:
      - task: extension:require
        vars: { COMMAND: 'extension:deps:install' }
      - cd {{.EXTENSION}} && pip install -ve .

  extension:link:
    desc: Develop-link an existing extension into the local Jupyter env
    cmds:
      - task: extension:require
        vars: { COMMAND: 'extension:link' }
      - cd {{.EXTENSION}} && jupyter labextension develop . --overwrite

  extension:require:
    internal: true
    desc: Guard that fails when EXTENSION is unset or still the 'none' default.
    requires:
      vars: [COMMAND]
    preconditions:
      - sh: '[ "{{.EXTENSION}}" != "none" ] && [ "{{.EXTENSION}}" != "''none''" ]'
        msg: |
          Please set the EXTENSION variable for `{{.COMMAND}}`.
          Example: task {{.COMMAND}} EXTENSION=my-extension
